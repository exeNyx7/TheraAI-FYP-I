services:
  - type: web
    name: theraai-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.prod.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 1
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: AI_MODELS_DISABLED
        value: "true"
      - key: MAIL_ENABLED
        value: "false"
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: MONGODB_DATABASE
        value: theraai_dev
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: JITSI_DOMAIN
        value: meet.jit.si
      - key: CORS_ALLOW_CREDENTIALS
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: MONGODB_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
