services:

  # ── MongoDB (local dev only) ─────────────────────────────────────────────────
  # Skip this if you're using MongoDB Atlas — set MONGODB_URL in backend/.env instead.
  mongodb:
    image: mongo:7.0
    container_name: theraai-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - theraai-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Backend ──────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev     # Full deps with PyTorch for local AI models
    container_name: theraai-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./backend:/app               # Hot reload — source changes apply instantly
      - hf_models_cache:/root/.cache/huggingface
    networks:
      - theraai-network
    env_file:
      - ./backend/.env
    environment:
      # Override .env values for Docker networking
      - MONGODB_URL=mongodb://mongodb:27017
      - MONGODB_DATABASE=theraai_dev
      - DEBUG=True
      - AI_MODELS_FORCE_CPU=true
      - CORS_ORIGINS=["http://localhost:3000","http://127.0.0.1:3000"]
      # GROQ_API_KEY is read from backend/.env via env_file above

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:8000
    container_name: theraai-frontend
    restart: unless-stopped
    ports:
      - "3000:80"                    # nginx serves on 80 inside, mapped to 3000 outside
    depends_on:
      - backend
    networks:
      - theraai-network

volumes:
  mongodb_data:
  hf_models_cache:

networks:
  theraai-network:
    driver: bridge
